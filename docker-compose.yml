services:
  backend:
    build: ./backend
    container_name: sha_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: sha_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    working_dir: /app
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0